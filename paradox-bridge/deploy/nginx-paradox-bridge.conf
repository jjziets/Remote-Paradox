# /etc/nginx/sites-available/paradox-bridge
# Reverse proxy for Paradox Bridge API + static web app
#
# TLS termination, rate limiting, security headers.
# FastAPI listens on 127.0.0.1:8080 (plain HTTP).
# nginx listens on 9433 (customisable — avoids conflict with 443/8443).
# Router: forward WAN:9433 → Pi:9433

# Rate-limit zone: 10 requests/sec per IP for login, burst of 5
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# Rate-limit zone: 30 req/s per IP for general API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 9433 ssl http2 default_server;
    listen [::]:9433 ssl http2 default_server;
    server_name _;

    # TLS — uses the same self-signed cert generated by paradox-bridge
    ssl_certificate     /etc/paradox-bridge/server.crt;
    ssl_certificate_key /etc/paradox-bridge/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:2m;
    ssl_session_timeout 1h;

    # ── Security headers ──
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Static web app ──
    root /opt/paradox-bridge/web-app;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    # ── Auth endpoints (rate-limited) ──
    location /auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/register {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API proxy (general) ──
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}
