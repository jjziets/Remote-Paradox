name: Build & Sign Android APKs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build phone app (release)
        run: ./gradlew :app:assembleRelease

      - name: Build watch app (release)
        run: ./gradlew :watch-app:assembleRelease

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/release/*.apk remote-paradox-phone.apk
          cp watch-app/build/outputs/apk/release/*.apk remote-paradox-watch.apk

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-app-release
          path: android-app/remote-paradox-phone.apk
          if-no-files-found: error

      - name: Upload watch APK
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-release
          path: android-app/remote-paradox-watch.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            remote-paradox-phone.apk \
            remote-paradox-watch.apk
        working-directory: android-app

      - name: Clean up keystore
        if: always()
        run: rm -f release-keystore.jks keystore.properties
