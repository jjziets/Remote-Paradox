<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remote Paradox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh}
.top{background:#16213e;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.top h1{font-size:18px;font-weight:700}
.top .user{font-size:12px;opacity:.6}
.top-btns{display:flex;align-items:center;gap:8px}
.top-btns button{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.top-btns button:hover{background:rgba(255,255,255,.1)}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.card{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px}
.banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:12px}
.banner.on{background:rgba(76,175,80,.15);color:#4caf50}
.banner.off{background:rgba(68,34,34,1);color:#e94560}

.alarm-banner{background:#e94560;color:#fff;border-radius:12px;padding:16px;margin-bottom:12px;animation:pulse 1s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.7}}
.alarm-banner h2{font-size:20px;margin-bottom:6px}
.alarm-banner .zones{font-size:14px;opacity:.9;margin-bottom:10px}
.alarm-banner button{background:#fff;color:#e94560;border:none;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;width:100%}

.state-card{display:flex;align-items:center;gap:16px}
.state-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.state-label{font-size:22px;font-weight:800}
.state-sub{font-size:13px;opacity:.6;margin-top:2px}

.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:none;color:#fff;cursor:pointer;font-size:13px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:rgba(0,210,255,.15);border-color:#00d2ff}
.tab .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

.view-tabs{display:flex;gap:0;margin-bottom:12px;background:#16213e;border-radius:10px;overflow:hidden}
.view-tab{flex:1;padding:10px;border:none;background:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:all .2s}
.view-tab.active{background:rgba(0,210,255,.15);color:#00d2ff}

.btns{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.btn-row{display:flex;gap:10px}
.btn{flex:1;padding:14px;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.red{background:#e94560}.btn.amber{background:#ff9800}.btn.green{background:#4caf50}.btn.blue{background:#00d2ff;color:#1a1a2e}

.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.zone-card{background:#16213e;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:4px;position:relative}
.zone-card.alarm-zone{background:rgba(233,69,96,.2);border:1px solid #e94560}
.zone-card.was-alarm{background:rgba(255,152,0,.1);border:1px solid rgba(255,152,0,.3)}
.zone-top{display:flex;align-items:center;gap:8px}
.zone-top .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zone-top .name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zone-bottom{display:flex;align-items:center;justify-content:space-between;font-size:11px;opacity:.7}
.zone-bottom .tags{display:flex;gap:4px}
.zone-bottom .tag{padding:1px 6px;border-radius:4px;font-weight:700;font-size:10px}
.tag.bp{background:rgba(255,152,0,.2);color:#ff9800}
.tag.al{background:rgba(233,69,96,.3);color:#e94560}
.zone-bottom .bp-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;color:rgba(255,255,255,.3)}
.zone-bottom .bp-btn.on{color:#ff9800}

.panic-section{margin:12px 0}
.panic-row{display:flex;gap:8px}
.btn.panic{background:#b71c1c;font-size:12px;padding:12px;flex-direction:column;gap:4px;min-height:64px}
.btn.panic.medical{background:#1565c0}
.btn.panic.fire{background:#e65100}

.section-title{font-weight:700;font-size:16px;margin:12px 0 8px}

.hist{display:flex;align-items:center;padding:8px 12px;background:rgba(22,33,62,.6);border-radius:8px;margin-bottom:4px}
.hist .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist .info{flex:1;margin-left:10px}
.hist .zn{font-size:13px}.hist .ts{font-size:11px;opacity:.4}
.hist .ev{font-size:12px;font-weight:700}
.hist .user-tag{font-size:11px;color:#64b5f6;margin-left:6px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#16213e;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center}
.modal h2{margin-bottom:12px;font-size:20px}
.modal .qr-img{max-width:260px;margin:16px auto;border-radius:8px}
.modal .code-text{font-family:monospace;font-size:14px;color:#00d2ff;word-break:break-all;margin:8px 0}
.modal .expire{font-size:12px;opacity:.5;margin-bottom:12px}
.modal .close-btn{margin-top:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:13px}
.modal .close-btn:hover{background:rgba(255,255,255,.2)}

.err{background:rgba(233,69,96,.15);color:#e94560;padding:12px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.login-wrap{max-width:360px;margin:80px auto;padding:24px}
.login-wrap h2{margin-bottom:16px;text-align:center}
.login-wrap input{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#16213e;color:#fff;font-size:14px}
.login-wrap .hint{font-size:11px;opacity:.4;margin-bottom:8px;text-align:center}
.login-wrap .server-row{display:flex;gap:8px;margin-bottom:10px}
.login-wrap .server-row input:first-child{flex:2}
.login-wrap .server-row input:last-child{flex:1;width:auto}
.code-box{text-align:center;margin:12px 0}
.code-box input{width:200px;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#16213e;color:#fff;font-size:20px;text-align:center;letter-spacing:4px}

/* User management */
.user-row{display:flex;align-items:center;padding:12px;background:rgba(22,33,62,.6);border-radius:10px;margin-bottom:8px}
.user-row .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:12px}
.user-row .avatar.admin{background:rgba(76,175,80,.2)}
.user-row .avatar.user{background:rgba(255,255,255,.1)}
.user-row .uinfo{flex:1}
.user-row .uname{font-size:14px;font-weight:600}
.user-row .urole{font-size:12px;font-weight:500}
.user-row .uactions{display:flex;gap:6px}
.user-row .uactions button{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}
.user-row .uactions button:hover{background:rgba(255,255,255,.1)}
.user-row .uactions button.del{border-color:rgba(233,69,96,.4);color:#e94560}
.user-row .self-tag{font-size:10px;background:rgba(100,181,246,.15);color:#64b5f6;padding:1px 6px;border-radius:4px;margin-left:6px}

/* System card */
.sys-card{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px}
.sys-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sys-label{font-size:13px;opacity:.7}
.sys-value{font-size:13px;font-weight:600}
.update-avail{color:#ff9800;font-weight:600;font-size:13px;margin-bottom:8px}

/* Resource bars */
.res-bar-wrap{margin-bottom:14px}
.res-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.res-bar-label{opacity:.7}
.res-bar-val{font-weight:600}
.res-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden}
.res-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.res-green{background:#4caf50}
.res-amber{background:#ff9800}
.res-red{background:#e94560}
.uptime-text{font-size:12px;opacity:.5;text-align:right;margin-top:4px}
</style>
</head>
<body>

<div class="top">
  <h1>Remote Paradox</h1>
  <div class="top-btns">
    <span class="user" id="userLabel"></span>
    <button id="btnUsers" style="display:none" onclick="switchView('users')">&#x1F465; Users</button>
    <button id="btnSystem" style="display:none" onclick="switchView('system')">&#x2699; System</button>
    <button id="btnInvite" style="display:none" onclick="doInvite()">+ Invite</button>
    <button onclick="doRefresh()">Refresh</button>
    <button onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="vLogin" class="login-wrap">
  <h2>Remote Paradox</h2>
  <div class="hint" id="loginHint">Log in with your credentials</div>
  <div id="serverFields" style="display:none">
    <div class="server-row">
      <input id="inHost" placeholder="Server IP / hostname" autocomplete="url">
      <input id="inPort" placeholder="9433" value="9433">
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;opacity:.7;cursor:pointer">
      <input type="checkbox" id="inHttps" checked style="width:auto;margin:0"> Use HTTPS
    </label>
  </div>
  <input id="inUser" placeholder="Username" autocomplete="username">
  <input id="inPass" placeholder="Password" type="password" autocomplete="current-password">
  <div id="loginErr" class="err"></div>
  <button class="btn blue" style="width:100%" onclick="doLogin()">Login</button>
</div>

<!-- APP -->
<div id="vApp" class="wrap" style="display:none">
  <div id="elBanner" class="banner off">Connecting...</div>
  <div id="elAlarm" style="display:none"></div>
  <div id="elTabs" class="tabs"></div>
  <div id="elState" class="card"></div>
  <div id="elErr" class="err"></div>

  <div id="elCodeSetup" class="code-box" style="display:none">
    <div class="section-title">Enter your alarm code</div>
    <div style="margin:12px 0"><input id="inCode" maxlength="6" placeholder="----"></div>
    <button class="btn blue" style="display:inline-block;padding:12px 24px" onclick="saveCode()">Save Code</button>
  </div>

  <div id="elCtrls" class="btns"></div>

  <div id="elPanic" class="panic-section" style="display:none">
    <div class="panic-row">
      <button class="btn panic" onclick="doPanic('emergency')"><span style="font-size:20px">&#x1F6A8;</span>PANIC</button>
      <button class="btn panic medical" onclick="doPanic('medical')"><span style="font-size:20px">&#x1F3E5;</span>MEDICAL</button>
      <button class="btn panic fire" onclick="doPanic('fire')"><span style="font-size:20px">&#x1F525;</span>FIRE</button>
    </div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="vtStatus" onclick="switchView('status')">Zones</button>
    <button class="view-tab" id="vtHistory" onclick="switchView('history')">History</button>
    <button class="view-tab" id="vtUsers" onclick="switchView('users')" style="display:none">Users</button>
    <button class="view-tab" id="vtSystem" onclick="switchView('system')" style="display:none">System</button>
  </div>

  <div id="elZones"></div>
  <div id="elHist" style="display:none"></div>
  <div id="elUsers" style="display:none"></div>
  <div id="elSystem" style="display:none"></div>
</div>

<!-- Invite QR modal -->
<div id="inviteModal" class="modal-overlay" style="display:none" onclick="closeInvite(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>&#x1F4F1; Invite New User</h2>
    <div id="inviteContent"></div>
  </div>
</div>

<script>
(function(){
  var token = localStorage.getItem('px_token');
  var username = localStorage.getItem('px_user');
  var alarmCode = localStorage.getItem('px_code');
  var userRole = localStorage.getItem('px_role');
  var baseUrl = localStorage.getItem('px_base_url') || '';
  var partitions = [], selectedPid = 1, histEvents = [], currentView = 'status';
  var timer = null, pollMs = 5000;

  var $ = function(id){ return document.getElementById(id); };

  var isDevMode = location.protocol === 'file:' ||
    (location.hostname === 'localhost' && location.port !== '9433');

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function api(method, path, body) {
    var url = (isDevMode ? baseUrl : '') + path;
    var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    return fetch(url, opts).then(function(r) {
      if (r.status === 401) { goLogin(); return Promise.reject('auth'); }
      return r.json().then(function(d) {
        if (!r.ok) return Promise.reject(d.detail || d.message || 'Request failed (' + r.status + ')');
        return d;
      });
    });
  }

  function needFastPoll() {
    return partitions.some(function(p){
      return p.mode === 'arming' || p.mode === 'triggered' || p.entry_delay;
    });
  }
  function adaptPoll() {
    var need = needFastPoll() ? 1000 : 5000;
    if (need !== pollMs) { pollMs = need; startPoll(); }
  }

  function goLogin() {
    stopPoll();
    $('vLogin').style.display = '';
    $('vApp').style.display = 'none';
    if (isDevMode) {
      $('serverFields').style.display = '';
      $('loginHint').textContent = 'Enter the server address and your credentials';
      if (baseUrl) {
        try {
          var u = new URL(baseUrl);
          $('inHost').value = u.hostname;
          $('inPort').value = u.port || '9433';
          $('inHttps').checked = u.protocol === 'https:';
        } catch(e){}
      }
    }
  }

  function goApp() {
    $('vLogin').style.display = 'none';
    $('vApp').style.display = '';
    $('userLabel').textContent = esc(username || '');
    var isAdmin = userRole === 'admin';
    $('btnInvite').style.display = isAdmin ? '' : 'none';
    $('btnUsers').style.display = isAdmin ? '' : 'none';
    $('btnSystem').style.display = isAdmin ? '' : 'none';
    $('vtUsers').style.display = isAdmin ? '' : 'none';
    $('vtSystem').style.display = isAdmin ? '' : 'none';
    if (alarmCode) {
      $('elCodeSetup').style.display = 'none';
      $('elCtrls').style.display = '';
      $('elPanic').style.display = '';
    } else {
      $('elCodeSetup').style.display = '';
      $('elCtrls').style.display = 'none';
      $('elPanic').style.display = 'none';
    }
    doRefresh();
    startPoll();
  }

  function startPoll() { stopPoll(); timer = setInterval(doRefresh, pollMs); }
  function stopPoll() { if (timer) { clearInterval(timer); timer = null; } }

  window.doLogin = function() {
    var u = $('inUser').value, p = $('inPass').value;
    if (isDevMode) {
      var host = $('inHost').value.trim();
      if (!host) { $('loginErr').textContent = 'Enter a server address'; $('loginErr').style.display = ''; return; }
      var port = $('inPort').value.trim() || '9433';
      var scheme = $('inHttps').checked ? 'https' : 'http';
      baseUrl = scheme + '://' + host + ':' + port;
      localStorage.setItem('px_base_url', baseUrl);
    }
    if (!u || !p) { $('loginErr').textContent = 'Enter username and password'; $('loginErr').style.display = ''; return; }
    $('loginErr').style.display = 'none';

    api('POST', '/auth/login', { username: u, password: p }).then(function(d) {
      token = d.token; username = d.username; userRole = d.role || '';
      localStorage.setItem('px_token', token);
      localStorage.setItem('px_user', username);
      localStorage.setItem('px_role', userRole);
      goApp();
    }).catch(function(e) {
      if (e === 'auth') return;
      $('loginErr').textContent = 'Login failed — check credentials';
      $('loginErr').style.display = '';
    });
  };

  window.saveCode = function() {
    var c = $('inCode').value.replace(/\D/g, '');
    if (c.length < 4) return;
    alarmCode = c;
    localStorage.setItem('px_code', c);
    $('elCodeSetup').style.display = 'none';
    $('elCtrls').style.display = '';
    $('elPanic').style.display = '';
    renderCtrls();
  };

  window.doRefresh = function() {
    api('GET', '/alarm/status').then(function(d) {
      var b = $('elBanner');
      if (d.connected) { b.className = 'banner on'; b.innerHTML = '&#x1F7E2; Panel connected'; }
      else { b.className = 'banner off'; b.innerHTML = '&#x1F534; Panel offline'; }
      partitions = d.partitions || [];
      if (!partitions.find(function(p){ return p.id === selectedPid; }) && partitions.length)
        selectedPid = partitions[0].id;
      renderTabs(); renderState(); renderCtrls(); renderAlarmBanner();
      if (currentView === 'status') renderZones();
      adaptPoll();
    }).catch(function(){});
    api('GET', '/alarm/history?limit=50').then(function(d) {
      histEvents = d.events || [];
      if (currentView === 'history') renderHist();
    }).catch(function(){});
  };

  window.switchView = function(view) {
    currentView = view;
    ['status','history','users','system'].forEach(function(v){
      var tab = $('vt' + v.charAt(0).toUpperCase() + v.slice(1));
      if (tab) tab.className = 'view-tab' + (v === view ? ' active' : '');
    });
    $('elZones').style.display = view === 'status' ? '' : 'none';
    $('elHist').style.display = view === 'history' ? '' : 'none';
    $('elUsers').style.display = view === 'users' ? '' : 'none';
    $('elSystem').style.display = view === 'system' ? '' : 'none';
    if (view === 'status') renderZones();
    if (view === 'history') renderHist();
    if (view === 'users') loadUsers();
    if (view === 'system') { loadSystem(); } else { clearInterval(sysRefreshTimer); }
  };

  function modeColor(m) {
    if (m === 'armed_away') return '#e94560';
    if (m === 'armed_home') return '#ff9800';
    if (m === 'arming') return '#ffeb3b';
    if (m === 'triggered') return '#e94560';
    return '#4caf50';
  }

  function renderTabs() {
    if (partitions.length <= 1) { $('elTabs').innerHTML = ''; return; }
    $('elTabs').innerHTML = partitions.map(function(p) {
      var col = modeColor(p.mode);
      var cls = p.id === selectedPid ? ' active' : '';
      var extra = '';
      if (p.mode === 'arming') extra = ' &#x23F3;';
      if (p.mode === 'triggered') extra = ' &#x26A0;';
      if (p.entry_delay) extra = ' &#x1F6AA;';
      return '<button class="tab' + cls + '" onclick="selectPart(' + parseInt(p.id) + ')">' +
        '<span class="dot" style="background:' + col + '"></span>' + esc(p.name) + extra + '</button>';
    }).join('');
  }

  window.selectPart = function(pid) {
    selectedPid = pid;
    renderTabs(); renderState(); renderCtrls(); renderAlarmBanner();
    if (currentView === 'status') renderZones();
  };

  function renderAlarmBanner() {
    var p = partitions.find(function(x){ return x.id === selectedPid; });
    if (!p || p.mode !== 'triggered') {
      $('elAlarm').style.display = 'none';
      return;
    }
    var triggered = (p.zones || []).filter(function(z){ return z.alarm || z.was_in_alarm; });
    var names = triggered.map(function(z){ return esc(z.name); }).join(', ');
    $('elAlarm').style.display = '';
    $('elAlarm').innerHTML =
      '<div class="alarm-banner">' +
      '<h2>&#x1F6A8; ALARM TRIGGERED</h2>' +
      '<div class="zones">Zone' + (triggered.length > 1 ? 's' : '') + ': <b>' + (names || 'Unknown') + '</b></div>' +
      '<button onclick="doArm(\'disarm\')">&#x1F513; DISARM NOW</button>' +
      '</div>';
  }

  function renderState() {
    var p = partitions.find(function(x){ return x.id === selectedPid; });
    if (!p) { $('elState').innerHTML = ''; return; }
    var m = p.mode, col, icon, label;
    if (m === 'triggered') {
      col = '#e94560'; icon = '&#x1F6A8;'; label = 'TRIGGERED';
    } else if (p.entry_delay) {
      col = '#ff5722'; icon = '&#x1F6AA;'; label = 'ENTRY DELAY';
    } else if (m === 'arming') {
      col = '#ffeb3b'; icon = '&#x23F3;'; label = 'ARMING...';
    } else if (m === 'armed_away') {
      col = '#e94560'; icon = '&#x1F6E1;'; label = 'ARMED AWAY';
    } else if (m === 'armed_home') {
      col = '#ff9800'; icon = '&#x1F3E0;'; label = 'ARMED HOME';
    } else if (m === 'disarmed') {
      col = '#4caf50'; icon = '&#x1F513;'; label = 'DISARMED';
    } else {
      col = 'gray'; icon = '?'; label = esc(m).toUpperCase();
    }
    var zones = p.zones || [], op = 0, bp = 0, al = 0;
    zones.forEach(function(z){ if(z.open) op++; if(z.bypassed) bp++; if(z.alarm || z.was_in_alarm) al++; });
    var sub = esc(p.name) + ' &bull; ' + zones.length + ' zones &bull; ' + op + ' open';
    if (bp) sub += ' &bull; ' + bp + ' bypassed';
    if (al) sub += ' &bull; <span style="color:#e94560">' + al + ' alarm</span>';
    var statusLine = '';
    if (!p.ready && m === 'disarmed') statusLine = '<div style="color:#ff9800;font-size:12px;margin-top:8px;font-weight:500">System not ready — close all zones first</div>';
    else if (m === 'arming') statusLine = '<div style="color:#ffeb3b;font-size:12px;margin-top:8px;font-weight:500">Exit delay in progress...</div>';
    else if (m === 'triggered') statusLine = '<div style="color:#e94560;font-size:12px;margin-top:8px;font-weight:500">Alarm triggered! Disarm immediately</div>';
    else if (p.entry_delay) statusLine = '<div style="color:#ff5722;font-size:12px;margin-top:8px;font-weight:500">Entry delay — disarm now</div>';
    $('elState').innerHTML =
      '<div class="state-card"><div class="state-icon" style="background:' + col + '22;color:' + col + '">' + icon + '</div>' +
      '<div><div class="state-label" style="color:' + col + '">' + label + '</div>' +
      '<div class="state-sub">' + sub + '</div>' + statusLine + '</div></div>';
  }

  function renderCtrls() {
    if (!alarmCode) { $('elCtrls').innerHTML = ''; return; }
    var p = partitions.find(function(x){ return x.id === selectedPid; });
    if (!p) { $('elCtrls').innerHTML = ''; return; }
    if (p.mode === 'arming') {
      $('elCtrls').innerHTML =
        '<button class="btn green" onclick="doArm(\'disarm\')" style="width:100%">&#x2716; CANCEL ARMING</button>';
      return;
    }
    if (p.mode === 'triggered' || p.entry_delay) {
      $('elCtrls').innerHTML =
        '<button class="btn green" onclick="doArm(\'disarm\')" style="width:100%;font-size:16px;padding:18px">&#x1F513; DISARM NOW</button>';
      return;
    }
    if (p.armed) {
      $('elCtrls').innerHTML =
        '<button class="btn green" onclick="doArm(\'disarm\')" style="width:100%">&#x1F513; DISARM</button>';
      return;
    }
    var dis = p.ready ? '' : ' disabled';
    var hint = p.ready ? '' : ' (not ready)';
    $('elCtrls').innerHTML =
      '<div class="btn-row">' +
      '<button class="btn red" onclick="doArm(\'arm-away\')"' + dis + '>&#x1F6E1; ARM AWAY' + hint + '</button>' +
      '<button class="btn amber" onclick="doArm(\'arm-stay\')"' + dis + '>&#x1F3E0; ARM HOME' + hint + '</button></div>' +
      '<button class="btn green" onclick="doArm(\'disarm\')" style="width:100%">&#x1F513; DISARM</button>';
  }

  window.doArm = function(action) {
    api('POST', '/alarm/' + action, { code: alarmCode, partition_id: selectedPid }).then(function(d) {
      if (d.success) doRefresh(); else showErr('Action failed: ' + esc(d.message||''));
    }).catch(function(e){ showErr(esc(String(e))); });
  };

  window.doPanic = function(type) {
    if (!confirm('Send ' + type.toUpperCase() + ' panic alert?')) return;
    api('POST', '/alarm/panic', { partition_id: selectedPid, panic_type: type }).then(function(d) {
      if (d.success) doRefresh(); else showErr('Panic failed');
    }).catch(function(e){ showErr(esc(String(e))); });
  };

  window.doBypass = function(zoneId, bypass) {
    api('POST', '/alarm/bypass', { zone_id: zoneId, bypass: bypass }).then(function(){ doRefresh(); })
    .catch(function(e){ showErr(esc(String(e))); });
  };

  function renderZones() {
    var p = partitions.find(function(x){ return x.id === selectedPid; });
    if (!p || !p.zones.length) { $('elZones').innerHTML = ''; return; }
    var h = '<div class="section-title">' + esc(p.name) + ' &mdash; ' + p.zones.length + ' zones</div>';
    h += '<div class="zone-grid">';
    p.zones.forEach(function(z) {
      var col = z.open ? '#ff9800' : '#4caf50';
      var st = z.open ? 'Open' : 'Closed';
      var dotCol = z.bypassed ? 'gray' : col;
      var cls = 'zone-card';
      if (z.alarm) cls += ' alarm-zone';
      else if (z.was_in_alarm) cls += ' was-alarm';
      var tags = '';
      if (z.bypassed) tags += '<span class="tag bp">BYP</span>';
      if (z.alarm) tags += '<span class="tag al">ALARM</span>';
      else if (z.was_in_alarm) tags += '<span class="tag al">WAS ALARM</span>';
      var bpCls = z.bypassed ? ' on' : '';
      h += '<div class="' + cls + '">' +
        '<div class="zone-top"><span class="dot" style="background:' + dotCol + '"></span>' +
        '<span class="name">' + esc(z.name) + '</span></div>' +
        '<div class="zone-bottom"><div class="tags">' + tags +
        '<span style="color:' + col + ';font-weight:500">' + st + '</span></div>' +
        '<button class="bp-btn' + bpCls + '" onclick="doBypass(' + parseInt(z.id) + ',' + (!z.bypassed) + ')" title="' + (z.bypassed?'Un-bypass':'Bypass') + '">&#x26D4;</button>' +
        '</div></div>';
    });
    h += '</div>';
    $('elZones').innerHTML = h;
  }

  function renderHist() {
    $('elHist').style.display = '';
    if (!histEvents.length) {
      $('elHist').innerHTML = '<div style="opacity:.5;font-size:13px;padding:8px;text-align:center">No events yet</div>';
      return;
    }
    var h = '';
    histEvents.slice(0,40).forEach(function(e) {
      var prop = e.property || '';
      var val = e.value;
      var col = '#4caf50';
      if (prop === 'alarm' || prop === 'panic' || prop === 'audible_alarm') col = '#e94560';
      else if (prop === 'open' && val === true) col = '#ff9800';
      else if (prop === 'entry_delay' || prop === 'exit_delay') col = '#ffeb3b';
      var ts = e.timestamp.substring(0,19).replace('T',' ');
      var evLabel = esc(prop).toUpperCase();
      if (typeof val === 'boolean') evLabel += val ? ' ON' : ' OFF';
      else if (val && typeof val === 'string') evLabel += ' ' + esc(val).toUpperCase();
      var icon = e.type === 'partition' ? '&#x1F3DB;' : '&#x1F4E1;';
      var userHtml = e.user ? '<span class="user-tag">by ' + esc(e.user) + '</span>' : '';
      h += '<div class="hist"><span class="dot" style="background:' + col + '"></span>' +
        '<div class="info"><div class="zn">' + icon + ' ' + esc(e.label) + userHtml + '</div><div class="ts">' + esc(ts) + '</div></div>' +
        '<span class="ev" style="color:' + col + '">' + evLabel + '</span></div>';
    });
    $('elHist').innerHTML = h;
  }

  // ── User Management ──

  function loadUsers() {
    $('elUsers').innerHTML = '<div style="text-align:center;padding:24px;opacity:.5">Loading users...</div>';
    api('GET', '/auth/users').then(function(d) {
      var users = d.users || [];
      var h = '<div class="section-title">&#x1F465; Users (' + users.length + ')</div>';
      users.forEach(function(u) {
        var isAdmin = u.role === 'admin';
        var isSelf = u.username === username;
        h += '<div class="user-row">';
        h += '<div class="avatar ' + (isAdmin ? 'admin' : 'user') + '">' + (isAdmin ? '&#x1F6E1;' : '&#x1F464;') + '</div>';
        h += '<div class="uinfo"><div class="uname">' + esc(u.username);
        if (isSelf) h += '<span class="self-tag">you</span>';
        h += '</div><div class="urole" style="color:' + (isAdmin ? '#4caf50' : 'rgba(255,255,255,.5)') + '">' + u.role.toUpperCase() + '</div></div>';
        if (!isSelf) {
          h += '<div class="uactions">';
          if (isAdmin) {
            h += '<button onclick="doRoleChange(\'' + esc(u.username) + '\',\'user\')" title="Demote to user">&#x2B07; Demote</button>';
          } else {
            h += '<button onclick="doRoleChange(\'' + esc(u.username) + '\',\'admin\')" title="Promote to admin">&#x2B06; Promote</button>';
          }
          h += '<button class="del" onclick="doDeleteUser(\'' + esc(u.username) + '\')" title="Delete user">&#x1F5D1; Delete</button>';
          h += '</div>';
        }
        h += '</div>';
      });
      h += '<div style="margin-top:16px"><button class="btn green" style="width:100%" onclick="doInvite()">&#x2795; Generate Invite QR Code</button></div>';
      $('elUsers').innerHTML = h;
    }).catch(function() {
      $('elUsers').innerHTML = '<div class="err" style="display:block">Failed to load users</div>';
    });
  }

  window.doRoleChange = function(uname, newRole) {
    var action = newRole === 'admin' ? 'Promote' : 'Demote';
    if (!confirm(action + ' ' + uname + ' to ' + newRole + '?')) return;
    api('PUT', '/auth/users/' + encodeURIComponent(uname) + '/role', { role: newRole }).then(function(d) {
      loadUsers();
    }).catch(function(e){
      if (e === 'auth') return;
      showUserErr(String(e));
    });
  };

  window.doDeleteUser = function(uname) {
    if (!confirm('Delete user "' + uname + '"? This cannot be undone.')) return;
    api('DELETE', '/auth/users/' + encodeURIComponent(uname)).then(function(d) {
      loadUsers();
    }).catch(function(e){
      if (e === 'auth') return;
      showUserErr(String(e));
    });
  };

  function showUserErr(msg) {
    var el = $('elUsers');
    var errDiv = document.createElement('div');
    errDiv.className = 'err';
    errDiv.style.display = 'block';
    errDiv.textContent = msg;
    el.insertBefore(errDiv, el.firstChild);
    setTimeout(function(){ errDiv.remove(); }, 5000);
  }

  // ── System / Pi Update ──

  var sysRefreshTimer = null;

  function barColor(pct) {
    if (pct < 60) return 'res-green';
    if (pct < 85) return 'res-amber';
    return 'res-red';
  }

  function fmtUptime(s) {
    var d = Math.floor(s / 86400);
    var h = Math.floor((s % 86400) / 3600);
    var m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  function renderResourceBar(label, pct, detail) {
    return '<div class="res-bar-wrap">'
      + '<div class="res-bar-header"><span class="res-bar-label">' + esc(label) + '</span><span class="res-bar-val">' + esc(detail) + '</span></div>'
      + '<div class="res-bar"><div class="res-bar-fill ' + barColor(pct) + '" style="width:' + Math.min(pct, 100) + '%"></div></div>'
      + '</div>';
  }

  function loadSystem() {
    $('elSystem').innerHTML = '<div style="text-align:center;padding:24px;opacity:.5">Loading system info...</div>';

    Promise.all([
      api('GET', '/health').catch(function(){ return {}; }),
      api('GET', '/system/update-status').catch(function(){ return { pending: false }; }),
      api('GET', '/system/version').catch(function(){ return { version: '?' }; }),
      api('GET', '/system/resources').catch(function(){ return null; }),
      api('GET', '/system/wifi').catch(function(){ return null; }),
    ]).then(function(results) {
      var health = results[0] || {};
      var update = results[1] || {};
      var ver = results[2] || {};
      var res = results[3];
      var wifi = results[4];

      var h = '';

      // ── System Resources ──
      if (res) {
        h += '<div class="sys-card">';
        h += '<div class="section-title" style="margin-top:0">&#x1F4CA; System Resources</div>';
        h += renderResourceBar('CPU', res.cpu_percent, res.cpu_percent.toFixed(1) + '%');
        h += renderResourceBar('Memory', res.memory_percent, res.memory_used_mb + ' / ' + res.memory_total_mb + ' MB');
        h += renderResourceBar('Storage', res.disk_percent, res.disk_used_gb.toFixed(1) + ' / ' + res.disk_total_gb.toFixed(1) + ' GB');
        if (res.uptime_seconds) {
          h += '<div class="uptime-text">Uptime: ' + fmtUptime(res.uptime_seconds) + '</div>';
        }
        h += '</div>';
      }

      // ── WiFi Info ──
      if (wifi) {
        h += '<div class="sys-card">';
        h += '<div class="section-title" style="margin-top:0">&#x1F4F6; WiFi</div>';
        h += '<div class="sys-row"><span class="sys-label">SSID</span><span class="sys-value">' + esc(wifi.ssid || 'not connected') + '</span></div>';
        h += '<div class="sys-row"><span class="sys-label">IP Address</span><span class="sys-value">' + esc(wifi.ip_address || '—') + '</span></div>';
        if (wifi.signal_percent != null) {
          h += '<div class="sys-row"><span class="sys-label">Signal</span><span class="sys-value">' + wifi.signal_percent + '% (' + wifi.signal_dbm + ' dBm)</span></div>';
        }
        h += '</div>';
      }

      // ── Service Status ──
      h += '<div class="sys-card">';
      h += '<div class="section-title" style="margin-top:0">&#x2699; Service Status</div>';
      h += '<div class="sys-row"><span class="sys-label">Pi Version</span><span class="sys-value">' + esc(ver.version || update.current_version || '?') + '</span></div>';
      h += '<div class="sys-row"><span class="sys-label">Panel Connected</span><span class="sys-value" style="color:' + (health.alarm_connected ? '#4caf50' : '#e94560') + '">' + (health.alarm_connected ? 'Yes' : 'No') + '</span></div>';
      h += '<div class="sys-row"><span class="sys-label">WebSocket Clients</span><span class="sys-value">' + (health.websocket_clients || 0) + '</span></div>';
      h += '<div class="sys-row"><span class="sys-label">Demo Mode</span><span class="sys-value">' + (health.demo_mode ? 'Yes' : 'No') + '</span></div>';
      h += '</div>';

      // ── Pi Software Update ──
      h += '<div class="sys-card">';
      h += '<div class="section-title" style="margin-top:0">&#x1F504; Pi Software Update</div>';
      if (update.pending && update.new_version) {
        h += '<div class="update-avail">&#x26A0; Update available: v' + esc(update.new_version) + ' (current: v' + esc(update.current_version || '?') + ')</div>';
        h += '<button class="btn amber" style="width:100%;margin-bottom:8px" onclick="doApplyPiUpdate()">&#x2B06; Apply Update v' + esc(update.new_version) + '</button>';
      } else {
        h += '<div style="color:#4caf50;font-size:13px;margin-bottom:8px">&#x2714; Pi is up to date (v' + esc(ver.version || update.current_version || '?') + ')</div>';
      }
      h += '<button class="btn blue" style="width:100%;margin-bottom:8px" onclick="doCheckPiUpdate()">&#x1F50D; Check for Updates</button>';
      h += '</div>';

      // ── Maintenance ──
      h += '<div class="sys-card">';
      h += '<div class="section-title" style="margin-top:0">&#x1F527; Maintenance</div>';
      h += '<button class="btn" style="width:100%;background:#e94560;border-color:#e94560" onclick="doReboot()">&#x1F504; Reboot Pi</button>';
      h += '</div>';

      $('elSystem').innerHTML = h;

      // Auto-refresh resources every 10s while System tab is open
      clearInterval(sysRefreshTimer);
      sysRefreshTimer = setInterval(refreshResources, 10000);
    });
  }

  function refreshResources() {
    // Only refresh resource bars, not the whole page
    api('GET', '/system/resources').then(function(res) {
      if (!res) return;
      var bars = document.querySelectorAll('.res-bar-wrap');
      if (bars.length < 3) return;
      // CPU
      var cpuFill = bars[0].querySelector('.res-bar-fill');
      var cpuVal = bars[0].querySelector('.res-bar-val');
      if (cpuFill) { cpuFill.style.width = Math.min(res.cpu_percent, 100) + '%'; cpuFill.className = 'res-bar-fill ' + barColor(res.cpu_percent); }
      if (cpuVal) cpuVal.textContent = res.cpu_percent.toFixed(1) + '%';
      // Memory
      var memFill = bars[1].querySelector('.res-bar-fill');
      var memVal = bars[1].querySelector('.res-bar-val');
      if (memFill) { memFill.style.width = Math.min(res.memory_percent, 100) + '%'; memFill.className = 'res-bar-fill ' + barColor(res.memory_percent); }
      if (memVal) memVal.textContent = res.memory_used_mb + ' / ' + res.memory_total_mb + ' MB';
      // Disk
      var diskFill = bars[2].querySelector('.res-bar-fill');
      var diskVal = bars[2].querySelector('.res-bar-val');
      if (diskFill) { diskFill.style.width = Math.min(res.disk_percent, 100) + '%'; diskFill.className = 'res-bar-fill ' + barColor(res.disk_percent); }
      if (diskVal) diskVal.textContent = res.disk_used_gb.toFixed(1) + ' / ' + res.disk_total_gb.toFixed(1) + ' GB';
      // Uptime
      var uptEl = document.querySelector('.uptime-text');
      if (uptEl && res.uptime_seconds) uptEl.textContent = 'Uptime: ' + fmtUptime(res.uptime_seconds);
    }).catch(function(){});
  }

  window.doCheckPiUpdate = function() {
    $('elSystem').innerHTML = '<div style="text-align:center;padding:24px;opacity:.5">Checking for updates...</div>';
    api('POST', '/system/check-update').then(function() {
      setTimeout(loadSystem, 2000);
    }).catch(function(e) {
      showErr('Check failed: ' + String(e));
      loadSystem();
    });
  };

  window.doApplyPiUpdate = function() {
    if (!confirm('Apply the pending update? The Pi service will restart.')) return;
    api('POST', '/system/apply-update').then(function(d) {
      if (d.success) {
        showErr('Update applied! Service restarting...');
        setTimeout(loadSystem, 10000);
      } else {
        showErr(d.message || 'Apply failed');
      }
    }).catch(function(e){ showErr(String(e)); });
  };

  window.doReboot = function() {
    if (!confirm('Are you sure you want to reboot the Pi?\nThe alarm controller will be offline for ~60 seconds.')) return;
    api('POST', '/system/reboot').then(function(d) {
      if (d.success) {
        $('elSystem').innerHTML = '<div style="text-align:center;padding:32px;color:#ff9800">&#x1F504; Pi is rebooting...<br><span style="font-size:12px;opacity:.6">The page will try to reconnect in 60 seconds.</span></div>';
        clearInterval(sysRefreshTimer);
        setTimeout(function(){ location.reload(); }, 60000);
      } else {
        showErr(d.message || 'Reboot failed');
      }
    }).catch(function(e){ showErr(String(e)); });
  };

  // ── Shared ──

  function showErr(msg) {
    $('elErr').textContent = msg; $('elErr').style.display = '';
    setTimeout(function(){ $('elErr').style.display = 'none'; }, 5000);
  }

  window.doLogout = function() {
    stopPoll();
    localStorage.removeItem('px_token'); localStorage.removeItem('px_user');
    localStorage.removeItem('px_code'); localStorage.removeItem('px_role');
    token = null; username = null; alarmCode = null; userRole = null;
    goLogin();
  };

  // ── Invite QR ──
  window.doInvite = function() {
    var el = $('inviteContent');
    el.innerHTML = '<p style="opacity:.5">Generating invite&hellip;</p>';
    $('inviteModal').style.display = '';
    api('POST', '/auth/invite').then(function(d) {
      var mins = Math.round((d.expires_in_seconds || d.expires_in || 900) / 60);
      var html = '';
      if (d.qr_data_uri) {
        html += '<img class="qr-img" src="' + d.qr_data_uri + '" alt="QR">';
      }
      html += '<div class="code-text">' + esc(d.code || '') + '</div>';
      html += '<div class="expire">Expires in ' + mins + ' minutes &bull; Single use only</div>';
      html += '<div style="font-size:11px;opacity:.4;word-break:break-all;margin-bottom:8px">' + esc(d.uri || '') + '</div>';
      html += '<button class="close-btn" onclick="closeInvite()">Close</button>';
      el.innerHTML = html;
    }).catch(function(e) {
      el.innerHTML = '<p class="err" style="display:block">Failed to create invite</p>'
        + '<button class="close-btn" onclick="closeInvite()">Close</button>';
    });
  };
  window.closeInvite = function(e) {
    if (e && e.target !== $('inviteModal')) return;
    $('inviteModal').style.display = 'none';
  };

  // INIT
  if (token) { goApp(); } else { goLogin(); }
})();
</script>
</body>
</html>
